name: ParaBank CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.test_type }} tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - test_type: API
            tag: "@api"
            report_name: api-cucumber-reports
            surefire_name: api-surefire-reports
          - test_type: UI
            tag: "@ui"
            report_name: ui-cucumber-reports
            surefire_name: ui-surefire-reports

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run ${{ matrix.test_type }} tests
        run: mvn -B clean test -Dheadless=true -Dcucumber.filter.tags="${{ matrix.tag }}"

      - name: Upload ${{ matrix.test_type }} Cucumber reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.report_name }}
          path: target/cucumber-reports/**
          if-no-files-found: ignore

      - name: Upload ${{ matrix.test_type }} Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.surefire_name }}
          path: target/surefire-reports/**
          if-no-files-found: ignore

      - name: Upload ${{ matrix.test_type }} failure screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.test_type }}-failure-screenshots
          path: target/screenshots/**
          if-no-files-found: ignore